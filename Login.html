<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyGuard Enterprise - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #050810;
            color: #e2e8f0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .input-focus:focus {
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            outline: none;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.8s ease-out forwards;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">
    <!-- Background Blobs -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[150px] pointer-events-none">
    </div>

    <div class="glass-card w-full max-w-md p-12 rounded-[2.5rem] relative z-10 animate-fade-in">
        <div class="flex flex-col items-center mb-10">
            <div
                class="h-16 w-16 rounded-2xl bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-lg glow flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white uppercase">KeyGuard <span
                    class="text-emerald-500 text-lg block text-center mt-1">Enterprise</span></h1>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Access
                    Password</label>
                <input type="password" id="password" placeholder="••••••••"
                    class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl px-6 py-4 text-white font-medium input-focus transition-all">
            </div>

            <button onclick="handleLogin()" id="loginBtn"
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-extrabold py-5 rounded-2xl glow hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                <span id="btnText">로그인 (Sign In)</span>
                <div id="loader"
                    class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
            <p id="errorMsg" class="text-rose-500 text-xs font-bold text-center mt-4 h-4"></p>
        </div>

        <p class="text-[10px] text-slate-500 text-center mt-10 font-bold uppercase tracking-widest">
            © 2024 KeyGuard Management Infrastructure
        </p>
    </div>

    <script>
        function handleLogin() {
            const pwd = document.getElementById('password').value;
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');

            if (!pwd) {
                errorMsg.innerText = "비밀번호를 입력해주세요.";
                return;
            }

            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
            errorMsg.innerText = "";

            if (typeof google !== 'undefined') {
                google.script.run.withSuccessHandler(res => {
                    if (res.success) {
                        localStorage.setItem('user_role', res.role);
                        localStorage.setItem('user_branch', res.branch);
                        window.top.location.href = '?page=' + res.redirect + '&auth=true&role=' + res.role + '&branch=' + encodeURIComponent(res.branch);
                    } else {
                        btnText.classList.remove('hidden');
                        loader.classList.add('hidden');
                        errorMsg.innerText = res.message;
                    }
                }).checkLogin(pwd);
            } else {
                // Local dev sim
                setTimeout(() => {
                    if (pwd === '1234' || pwd === 'admin1234') {
                        const role = pwd === '1234' ? 'Branch' : 'Admin';
                        const branch = pwd === '1234' ? '중앙' : 'HQ';
                        const redirect = role === 'Admin' ? 'Admin' : 'Index';
                        alert("로그인 성공 (로컬 시뮬레이션)");
                        window.top.location.href = '?page=' + redirect + '&auth=true&role=' + role + '&branch=' + encodeURIComponent(branch);
                    } else {
                        btnText.classList.remove('hidden');
                        loader.classList.add('hidden');
                        errorMsg.innerText = "비밀번호가 올바르지 않습니다.";
                    }
                }, 1000);
            }
        }

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>

</html>
